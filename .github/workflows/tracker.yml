name: Weekly Disaster Tracker

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-tracker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Run tracker
        run: python weather-event-tracker.py

      - name: Run reader
        run: python reader.py

      - name: Save files back to repo
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add log.json log_analysis.txt
          git commit -m "Weekly disaster log update" || echo "No changes to commit"
          git push
